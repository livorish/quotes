<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Цитаты великих людей</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v6.6.0/css/all.css"
    />
  </head>
  <body>
    <div class="container">
      <h1>Цитаты великих людей</h1>
      <p id="quote" class="quote">Clcik the button to get a random quote</p>
      <p id="quote-author">(author)</p>
      <i id="toggle-favorite-btn" class="fa-regular fa-star star-icon"></i>
      <button id="generate-btn" class="btn">Generate Quote</button>
    </div>

    <div class="favorites-container" id="favorites-container"></div>

    <script src="index.js" type="module"></script>
  </body>
</html>
